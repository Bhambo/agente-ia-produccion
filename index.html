<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 780px;
      padding: 20px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e2130;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.75rem; color: #555; }

    #btn-reset {
      background: none;
      border: 1px solid #2a2d3e;
      color: #888;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    #btn-reset:hover { border-color: #555; color: #ccc; }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mensaje {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      gap: 4px;
    }

    .mensaje.usuario { align-self: flex-end; align-items: flex-end; }
    .mensaje.agente  { align-self: flex-start; align-items: flex-start; }

    .burbuja {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .usuario .burbuja {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .agente .burbuja {
      background: #1a1d2b;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #232639;
    }

    .tool-badge {
      font-size: 0.72rem;
      color: #7c8aaa;
      padding: 3px 8px;
      background: #12151f;
      border: 1px solid #1e2235;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #7c8aaa;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #form {
      width: 100%;
      max-width: 780px;
      padding: 16px 24px 24px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 0.93rem;
      outline: none;
      resize: none;
      height: 48px;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: #2563eb; }
    #input::placeholder { color: #444; }

    #btn-send {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      height: 48px;
    }
    #btn-send:hover { background: #1d4ed8; }
    #btn-send:disabled { background: #1e2a4a; cursor: not-allowed; color: #555; }

    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #333;
    }
    #empty .icon { font-size: 2.5rem; }
    #empty p { font-size: 0.85rem; }
    .sugerencias { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      background: #1a1d2b;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #2563eb; color: #ccc; }
  </style>
</head>
<body>

<header>
  <h1>🤖 Agente IA</h1>
  <div style="display:flex; align-items:center; gap:12px;">
    <span id="estado">● conectado</span>
    <button id="btn-reset">Nueva conversación</button>
  </div>
</header>

<div id="chat">
  <div id="empty">
    <div class="icon">✦</div>
    <p>¿En qué puedo ayudarte hoy?</p>
    <div class="sugerencias">
      <span class="chip" onclick="enviarChip(this)">¿Qué tiempo hace en Madrid?</span>
      <span class="chip" onclick="enviarChip(this)">¿Qué es la inteligencia artificial?</span>
      <span class="chip" onclick="enviarChip(this)">Guarda una nota: revisar proyecto</span>
      <span class="chip" onclick="enviarChip(this)">¿Qué notas tengo?</span>
    </div>
  </div>
</div>

<form id="form" onsubmit="return false;">
  <textarea id="input" placeholder="Escribe un mensaje..." rows="1"></textarea>
  <button id="btn-send" onclick="enviar()">➤</button>
</form>

<script>
  const chat    = document.getElementById("chat");
  const input   = document.getElementById("input");
  const btnSend = document.getElementById("btn-send");
  const empty   = document.getElementById("empty");
  let enviando  = false;

  // Enviar con Enter (Shift+Enter = nueva línea)
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
  });

  function enviarChip(el) {
    input.value = el.textContent;
    enviar();
  }

  function agregarMensaje(rol, texto, id) {
    if (empty) empty.style.display = "none";
    const div = document.createElement("div");
    div.className = `mensaje ${rol}`;
    if (id) div.id = id;
    const burbuja = document.createElement("div");
    burbuja.className = "burbuja";
    burbuja.textContent = texto;
    div.appendChild(burbuja);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return burbuja;
  }

  function agregarToolBadge(nombre, contenedorId) {
    const contenedor = document.getElementById(contenedorId);
    if (!contenedor) return;
    const badge = document.createElement("div");
    badge.className = "tool-badge";
    const iconos = {
      obtener_clima: "🌤️",
      buscar_wikipedia: "📖",
      guardar_nota: "💾",
      listar_notas: "📋",
    };
    badge.textContent = `${iconos[nombre] || "🔧"} ${nombre.replace(/_/g, " ")}`;
    contenedor.insertBefore(badge, contenedor.querySelector(".burbuja"));
  }

  async function enviar() {
    const texto = input.value.trim();
    if (!texto || enviando) return;

    enviando = true;
    btnSend.disabled = true;
    input.value = "";

    // Mensaje del usuario
    agregarMensaje("usuario", texto);

    // Burbuja del agente (vacía, se va llenando)
    const idAgente = "msg-" + Date.now();
    const burbuja = agregarMensaje("agente", "", idAgente);
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    burbuja.appendChild(cursor);

    try {
      const resp = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje: texto }),
      });

      const data = await resp.json();

      // Muestra badges de tools usadas
      for (const nombre of (data.tools || [])) {
        agregarToolBadge(nombre, idAgente);
      }

      // Muestra el texto de respuesta
      cursor.remove();
      burbuja.textContent = data.texto || "Sin respuesta";
      chat.scrollTop = chat.scrollHeight;

    } catch (err) {
      burbuja.textContent = "Error de conexión. ¿Está corriendo el servidor?";
      cursor.remove();
    }

    enviando = false;
    btnSend.disabled = false;
    input.focus();
  }

  document.getElementById("btn-reset").onclick = async () => {
    await fetch("/reset", { method: "POST" });
    chat.innerHTML = "";
    chat.appendChild(empty);
    empty.style.display = "flex";
  };
</script>
</body>
</html>
